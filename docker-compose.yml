version: '3.8'

services:
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - travelmate_db:/app/travelmate.db
    environment:
      - DATABASE_URL=sqlite:///./travelmate.db
      - AI_PROVIDER=gemini
    # .env file should be present in Backend/

volumes:
  travelmate_db:
